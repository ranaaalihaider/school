<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ali Public School — Data</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:   #0d1b3e;
      --gold:   #c8993a;
      --gold-lt:#f0c060;
      --cream:  #f7f3ec;
      --white:  #ffffff;
      --shadow: 0 8px 40px rgba(13,27,62,.18);
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--navy);
      font-family: 'DM Sans', sans-serif;
      overflow: hidden;
    }

    /* ── Animated background ── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 10%, rgba(200,153,58,.12) 0%, transparent 60%),
        radial-gradient(ellipse 60% 80% at 80% 90%, rgba(200,153,58,.10) 0%, transparent 60%),
        linear-gradient(160deg, #0d1b3e 0%, #14275a 50%, #0a1530 100%);
      z-index: 0;
    }

    /* floating orbs */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: .18;
      animation: drift 12s ease-in-out infinite alternate;
      z-index: 0;
    }
    .orb1 { width: 420px; height: 420px; background: var(--gold); top: -120px; left: -100px; }
    .orb2 { width: 320px; height: 320px; background: #3a6fc8; bottom: -80px; right: -60px; animation-delay: -6s; }

    @keyframes drift {
      from { transform: translate(0,0) scale(1); }
      to   { transform: translate(40px, 30px) scale(1.08); }
    }

    /* ── Card ── */
    .card {
      position: relative; z-index: 1;
      background: rgba(255,255,255,.04);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(200,153,58,.25);
      border-radius: 24px;
      padding: clamp(2rem, 6vw, 4rem) clamp(1.5rem, 8vw, 5rem);
      max-width: 520px;
      width: calc(100% - 2rem);
      text-align: center;
      box-shadow:
        var(--shadow),
        inset 0 1px 0 rgba(255,255,255,.08);
      animation: rise .8s cubic-bezier(.22,1,.36,1) both;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(32px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Crest / Icon ── */
    .crest {
      width: 72px; height: 72px;
      margin: 0 auto 1.25rem;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--gold) 0%, var(--gold-lt) 100%);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 20px rgba(200,153,58,.45);
      animation: rise .8s .1s cubic-bezier(.22,1,.36,1) both;
    }
    .crest svg { width: 38px; height: 38px; fill: var(--navy); }

    /* ── Title ── */
    .school-name {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.6rem, 5vw, 2.4rem);
      font-weight: 900;
      color: var(--white);
      letter-spacing: .5px;
      line-height: 1.2;
      animation: rise .8s .2s cubic-bezier(.22,1,.36,1) both;
    }

    .subtitle {
      margin-top: .55rem;
      font-size: clamp(.75rem, 2vw, .9rem);
      font-weight: 500;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--gold);
      animation: rise .8s .3s cubic-bezier(.22,1,.36,1) both;
    }

    .divider {
      margin: 1.8rem auto;
      width: 60px; height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      animation: rise .8s .35s cubic-bezier(.22,1,.36,1) both;
    }

    /* ── Buttons ── */
    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      animation: rise .8s .4s cubic-bezier(.22,1,.36,1) both;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 1rem 1.5rem;
      border-radius: 14px;
      border: none;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      text-decoration: none;
      transition: transform .2s ease, box-shadow .2s ease, background .2s ease;
      position: relative;
      overflow: hidden;
    }

    .btn::after {
      content: '';
      position: absolute; inset: 0;
      background: rgba(255,255,255,0);
      transition: background .2s;
    }
    .btn:hover::after { background: rgba(255,255,255,.07); }
    .btn:hover  { transform: translateY(-3px); }
    .btn:active { transform: translateY(0); }

    /* Active */
    .btn-active {
      background: linear-gradient(135deg, #1a7a4a, #25a367);
      color: var(--white);
      box-shadow: 0 6px 24px rgba(26,122,74,.4);
    }
    .btn-active:hover { box-shadow: 0 10px 30px rgba(26,122,74,.55); }

    /* Submitted */
    .btn-submitted {
      background: linear-gradient(135deg, #1a4e8c, #2471d4);
      color: var(--white);
      box-shadow: 0 6px 24px rgba(26,78,140,.4);
    }
    .btn-submitted:hover { box-shadow: 0 10px 30px rgba(26,78,140,.55); }

    /* Migrated */
    .btn-migrated {
      background: linear-gradient(135deg, #7a3a1a, #d46024);
      color: var(--white);
      box-shadow: 0 6px 24px rgba(122,58,26,.4);
    }
    .btn-migrated:hover { box-shadow: 0 10px 30px rgba(122,58,26,.55); }

    .btn-label { flex: 1; text-align: left; }
    .btn-icon  { font-size: 1.2rem; opacity: .85; }
    .btn-arrow { font-size: .9rem; opacity: .7; transition: transform .2s; }
    .btn:hover .btn-arrow { transform: translateX(4px); opacity: 1; }

    /* ── Footer ── */
    .footer-note {
      margin-top: 2rem;
      font-size: .75rem;
      color: rgba(255,255,255,.28);
      letter-spacing: .5px;
      animation: rise .8s .55s cubic-bezier(.22,1,.36,1) both;
    }

    /* ── Responsive tweaks ── */
    @media (min-width: 480px) {
      .btn-group { flex-direction: column; }
    }
  </style>
</head>
<body>

  <div class="orb orb1"></div>
  <div class="orb orb2"></div>

  <div class="card">

    <!-- Crest -->
    <div class="crest">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2L2 7v2c0 5.55 4.08 10.74 10 12 5.92-1.26 10-6.45 10-12V7L12 2zm0 2.18L20 8v1c0 4.73-3.4 9.16-8 10.37C7.4 18.16 4 13.73 4 9V8l8-3.82zM11 7v6h2V7h-2zm0 8v2h2v-2h-2z"/>
      </svg>
    </div>

    <h1 class="school-name">ALI PUBLIC SCHOOL</h1>
    <p class="subtitle">Student Data Portal</p>

    <div class="divider"></div>

    <nav class="btn-group">
      <a href="active.html" class="btn btn-active">
        <span class="btn-icon">✅</span>
        <span class="btn-label">Active</span>
        <span class="btn-arrow">›</span>
      </a>

      <a href="submitted.html" class="btn btn-submitted">
        <span class="btn-icon">📋</span>
        <span class="btn-label">Submitted</span>
        <span class="btn-arrow">›</span>
      </a>

      <a href="migrated.html" class="btn btn-migrated">
        <span class="btn-icon">🚀</span>
        <span class="btn-label">Migrated</span>
        <span class="btn-arrow">›</span>
      </a>
    </nav>

    <p class="footer-note">Select a category to view records</p>

  </div>

</body>
</html>
